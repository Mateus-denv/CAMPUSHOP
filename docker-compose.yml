# ============================================
# CampuShop - Docker Compose Configuration
# Marketplace Estudantil - Ambiente Completo
# ============================================

# ============================================
# SERVIÇOS
# ============================================
services:
  # ==========================================
  # MySQL Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: campushop-mysql

    # Reiniciar automaticamente em caso de falha
    restart: unless-stopped

    # Variáveis de ambiente do MySQL
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: campushop
      MYSQL_USER: campushop_user
      MYSQL_PASSWORD: campushop_pass
      # Configurações de performance
      MYSQL_INITDB_SKIP_TZINFO: 1

    # Portas expostas (host:container)
    ports:
      - "3306:3306"

    # Volumes para persistência de dados
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_config:/etc/mysql/conf.d
      # Inicializa schema/seed automaticamente apenas na primeira criação do volume.
      - ./db/scripts/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      # Mantém dados mínimos (usuários/produtos) consistentes em máquina nova.
      - ./db/scripts/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro

    # Rede interna
    networks:
      - campushop-network

    # Healthcheck robusto
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    # Configurações de recursos (opcional)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ==========================================
  # CampuShop Application (Spring Boot)
  # ==========================================
  app:
    # Build a partir do Dockerfile local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Argumentos de build (se necessário)
        MAVEN_OPTS: "-Dmaven.repo.local=/root/.m2/repository"

    container_name: campushop-app

    # Reiniciar automaticamente
    restart: unless-stopped

    # Portas expostas
    ports:
      - "8080:8080"

    # Variáveis de ambiente da aplicação
    environment:
      # Spring Profiles
      SPRING_PROFILES_ACTIVE: docker

      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/campushop?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver

      # JPA/Hibernate
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"

      # Server Configuration
      SERVER_PORT: 8080

      # Thymeleaf
      SPRING_THYMELEAF_CACHE: "false"

      # JVM Options
      JAVA_OPTS: >-
        -Xmx512m -Xms256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom -Duser.timezone=America/Sao_Paulo

    # Dependências entre serviços
    depends_on:
      mysql:
        condition: service_healthy

    # Volumes (para desenvolvimento - hot reload)
    volumes:
      - app_logs:/app/logs
      - app_temp:/app/temp

    # Rede interna
    networks:
      - campushop-network

    # Healthcheck da aplicação
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Configurações de recursos
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M

  # ==========================================
  # phpMyAdmin
  # ==========================================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: campushop-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      # O PMA_HOST já preenche o campo "Server" automaticamente para você!
      PMA_HOST: mysql
      PMA_PORT: 3306
    networks:
      - campushop-network
    depends_on:
      mysql:
        condition: service_healthy

# ============================================
# VOLUMES (Persistência de Dados)
# ============================================
volumes:
  # Volume para dados do MySQL (tabelas, índices, etc.)
  mysql_data:
    driver: local
    name: campushop_mysql_data

  # Volume para configurações do MySQL
  mysql_config:
    driver: local
    name: campushop_mysql_config

  # Volume para logs da aplicação
  app_logs:
    driver: local
    name: campushop_app_logs

  # Volume para arquivos temporários
  app_temp:
    driver: local
    name: campushop_app_temp

# ============================================
# NETWORKS (Rede Isolada)
# ============================================
networks:
  campushop-network:
    driver: bridge
    name: campushop_network
    ipam:
      config:
        - subnet: 172.28.0.0/16
