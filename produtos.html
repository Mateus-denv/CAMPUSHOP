<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style3.css">
    <link rel="stylesheet" href="css/produtos.css">
    <title>Meus Produtos - CampusShop</title>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="brand">
                <div class="logo-circle" aria-hidden></div>
                <a href="#" class="logo">Campus<span>Shop</span></a>
            </div>

            <div class="search-wrap">
                <input class="search" type="search" placeholder="Buscar produtos..." aria-label="Buscar produtos">
            </div>

            <nav class="main-nav">
                <a href="#">Home</a>
                <a href="#categories">Categorias</a>
                <a href="#">Entrar</a>
                <a href="#" class="btn btn-ghost">Cadastrar</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <a href="editar-perfil.html" class="btn btn-secondary return-button">Voltar</a>
            <h1 class="section-title">Meus Produtos</h1>
            <div class="product-list">
                <!-- Produto 1 -->
                <div class="product-card">
                    <img src="https://via.placeholder.com/150" alt="Produto 1" class="product-image">
                    <div class="product-info">
                        <h2 class="product-title">Produto 1</h2>
                        <p class="product-description">Descrição breve do produto 1.</p>
                        <p class="product-price">R$ 100,00</p>
                    </div>
                </div>

                <!-- Produto 2 -->
                <div class="product-card">
                    <img src="https://via.placeholder.com/150" alt="Produto 2" class="product-image">
                    <div class="product-info">
                        <h2 class="product-title">Produto 2</h2>
                        <p class="product-description">Descrição breve do produto 2.</p>
                        <p class="product-price">R$ 200,00</p>
                    </div>
                </div>

                <!-- Produto 3 -->
                <div class="product-card">
                    <img src="https://via.placeholder.com/150" alt="Produto 3" class="product-image">
                    <div class="product-info">
                        <h2 class="product-title">Produto 3</h2>
                        <p class="product-description">Descrição breve do produto 3.</p>
                        <p class="product-price">R$ 300,00</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; <strong>CampusShop</strong> — 2026. Feito para estudantes.</p>
        </div>
    </footer>
</body>
</html>
