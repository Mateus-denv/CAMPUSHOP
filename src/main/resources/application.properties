
spring.application.name=campushop_backend
server.port=${SERVER_PORT:8080}


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campushop?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# JWT: em produção, sobrescreva JWT_SECRET com uma chave segura via variável de ambiente
jwt.secret=${JWT_SECRET:Y2FtcHVzaG9wLXNlY3JldC1rZXktZm9yLWp3dC0yMDI2LWFwcC1zaWduYXR1cmU=}
jwt.expiration=${JWT_EXPIRATION:86400000}

