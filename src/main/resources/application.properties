
spring.application.name=campushop_backend
server.port=8080

# Rate limiting (ativar em produção)
app.rate-limit.enabled=true





spring.datasource.url=jdbc:mysql://localhost:3306/campushop?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true


spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

jwt.secret=Y2FtcHVzaG9wLXNlY3JldC1rZXktZm9yLWp3dC0yMDI2LWFwcC1zaWduYXR1cmU=
jwt.expiration=86400000

# SWAGGER / OPENAPI
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/api/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# EMAIL (Gmail exemplo - usar App Password do Gmail, não senha comum)
# Para Gmail: Settings -> Security -> App passwords
# Para testes: deixe um mailhog rodando em localhost:1025
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:seu_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:sua_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# URL do Frontend para links de verificação de email
app.frontend.url=http://localhost:5173

# LOGGING estruturado
logging.level.root=INFO
logging.level.br.com.campushop=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
