# Configurações para testes
# Usa banco H2 em memória para não afetar o MySQL real

spring.application.name=campushop_backend_test

# Banco H2 em memória
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Config
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf
spring.thymeleaf.cache=false

# JWT
jwt.secret=Y2FtcHVzaG9wLXNlY3JldC1rZXktZm9yLWp3dC0yMDI2LWFwcC1zaWduYXR1cmU=
jwt.expiration=86400000

# Email (desabilita envio em testes)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test

# Frontend URL
app.frontend.url=http://localhost:5173

# Log
logging.level.root=WARN
logging.level.br.com.campushop=DEBUG
