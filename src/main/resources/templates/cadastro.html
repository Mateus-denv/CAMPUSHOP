<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>CampusShop - Cadastro</title>
</head>
<body class="auth-body">
    <div class="back-button">
        <a th:href="@{/}"><button>⟵ Voltar para o início</button></a>
    </div>
    <div class="auth-container">
        <h1>Crie sua Conta</h1>
        <h2>Junte-se à comunidade e comece a negociar.</h2>

        <div th:if="${erro}" class="error-message" th:text="${erro}"></div>
        <div th:if="${sucesso}" class="success-message" th:text="${sucesso}"></div>

        <form th:action="@{/cadastro}" th:object="${usuario}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            
            <div class="form-group">
                <label for="nomeCompleto">Nome Completo</label>
                <input id="nomeCompleto" type="text" th:field="*{nomeCompleto}" placeholder="Seu nome completo" required>
            </div>

            <div class="form-group">
                <label for="ra">R.A (Registro Acadêmico)</label>
                <input id="ra" type="text" th:field="*{ra}" placeholder="Seu R.A institucional" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input id="email" type="email" th:field="*{email}" placeholder="seu@email.com" required>
            </div>

            <div class="two-col">
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="password-field">
                        <input id="senha" type="password" th:field="*{senha}" placeholder="Sua senha" required>
                        <span class="eye-icon" onclick="togglePassword('senha')">👁️</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmarSenha">Confirmar Senha</label>
                    <div class="password-field">
                        <input id="confirmarSenha" type="password" name="confirmarSenha" placeholder="Confirme sua senha" required>
                        <span class="eye-icon" onclick="togglePassword('confirmarSenha')">👁️</span>
                    </div>
                </div>
            </div>

            <div class="two-col">
                <div class="form-group">
                    <label for="instituicao">Instituição de Ensino</label>
                    <select id="instituicao" th:field="*{instituicao}" required>
                        <option value="" disabled selected>Selecione sua instituição</option>
                        <option value="UFBA">UFBA</option>
                        <option value="UNEB">UNEB</option>
                        <option value="SENAI">SENAI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <select id="cidade" th:field="*{cidade}" required>
                        <option value="" disabled selected>Selecione sua cidade</option>
                        <option value="Camaçari">Camaçari</option>
                        <option value="Salvador">Salvador</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Escolha seu perfil</label>
                <div class="profile-selection">
                    <label class="profile-option selected">
                        <input type="radio" th:field="*{perfil}" value="comprador" checked>
                        <div>
                            <strong>Comprador</strong>
                            <p class="profile-description">Quero comprar produtos</p>
                        </div>
                    </label>
                    <label class="profile-option">
                        <input type="radio" th:field="*{perfil}" value="vendedor">
                        <div>
                            <strong>Vendedor</strong>
                            <p class="profile-description">Quero vender produtos</p>
                        </div>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-gradient">Criar Conta</button>
        </form>
        <div class="final-box">
            <p>Já tem uma conta? <a th:href="@{/login}">Faça login</a></p>
            <p style="font-size: 13px; color: #6b7280; margin-top: 10px;">Ao criar uma conta, você concorda com nossos <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a>.</p>
        </div>
    </div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
