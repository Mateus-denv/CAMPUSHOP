<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>CampusShop - Cadastro</title>
</head>
<body class="auth-body">
    <div class="back-button">
        <a th:href="@{/}"><button>⟵ Voltar para o início</button></a>
    </div>
    <div class="auth-container">
        <h1>Crie sua Conta</h1>
        <h2>Junte-se à comunidade e comece a negociar.</h2>

        <div th:if="${erro}" class="error-message" th:text="${erro}"></div>
        <div th:if="${sucesso}" class="success-message" th:text="${sucesso}"></div>

        <form th:action="@{/cadastro}" method="post">
            
            <div class="form-group">
                <label for="nomeCliente">Nome Completo</label>
                <input id="nomeCliente" name="nomeCliente" type="text" placeholder="Seu nome completo" required>
            </div>

            <div class="form-group">
                <label for="ra">R.A (Registro Acadêmico)</label>
                <input id="ra" type="text" name="ra" placeholder="000000000" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" placeholder="seu@email.com" required>
            </div>

            <div class="two-col">
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="password-field">
                        <input id="senha" name="senha" type="password" placeholder="Sua senha" required>
                        <span class="eye-icon" onclick="togglePassword('senha')">👁️</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmarSenha">Confirmar Senha</label>
                    <div class="password-field">
                        <input id="confirmarSenha" name="confirmarSenha" type="password" placeholder="Confirme sua senha" required>
                        <span class="eye-icon" onclick="togglePassword('confirmarSenha')">👁️</span>
                    </div>
                </div>
            </div>

            <div class="two-col">
                <div class="form-group">
                    <label for="telefone">Telefone / WhatsApp</label>
                    <input id="telefone" name="telefone" type="text" placeholder="(00) 00000-0000" required>
                </div>
                <div class="form-group">
                    <label for="cpfCnpj">CPF ou CNPJ</label>
                    <input id="cpfCnpj" name="cpfCnpj" type="text" placeholder="000.000.000-00" required>
                </div>
            </div>

            <div class="two-col">
                <div class="form-group">
                    <label for="instituicaoEnsino">Instituição de Ensino</label>
                    <select id="instituicaoEnsino" name="instituicaoEnsino" required>
                        <option value="" disabled selected>Selecione sua instituição</option>
                        <option value="UFBA">UFBA</option>
                        <option value="UNEB">UNEB</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="nomeCidade">Cidade</label>
                    <select id="nomeCidade" name="cidade" required>
                        <option value="" disabled selected>Selecione sua cidade</option>
                        <option value="Camaçari">Camaçari</option>
                        <option value="Salvador">Salvador</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Escolha seu perfil</label>
                <div class="profile-selection">
                    <label class="profile-option">
                        <input type="radio" name="tipoConta" value="cliente" checked>
                        <div>
                            <strong>Cliente</strong>
                            <p class="profile-description">Quero comprar produtos</p>
                        </div>
                    </label>
                    <label class="profile-option">
                        <input type="radio" name="tipoConta" value="vendedor">
                        <div>
                            <strong>Vendedor</strong>
                            <p class="profile-description">Quero vender produtos</p>
                        </div>
                    </label>
                </div>
            </div>
            
            <button type="submit" class="btn btn-gradient">Criar Conta</button>
        </form>

        <div class="final-box">
            <p>Já tem uma conta? <a th:href="@{/login}">Faça login</a></p>
            <p style="font-size: 13px; color: #6b7280; margin-top: 10px;">Ao criar uma conta, você concorda com nossos <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a>.</p>
        </div>
    </div>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
