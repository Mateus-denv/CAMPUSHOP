<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>CampusShop - Login</title>
</head>
<body class="auth-body">
    <div class="back-button">
        <a th:href="@{/}"><button>⟵ Voltar para o início</button></a>
    </div>
    <div class="auth-container">
        <h1>CampuShop</h1>
        <h2>Bem-vindo de volta!</h2>

        <div th:if="${param.error != null}" class="error-message" style="color: red;">
            Usuário ou senha inválidos.
        </div>

        <form th:action="@{/login}" method="post" style="margin-top: 20px;">
            <div class="form-group">
                <label for="username">Email</label>
                <input type="text" id="username" name="username" placeholder="Seu usuário" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <div class="password-field">
                    <input type="password" id="password" name="password" placeholder="Sua senha" required>
                </div>
            </div>
            <button type="submit" class="btn btn-gradient">Entrar</button>
        </form>
        
        <div class="final-box">
            <p>Não tem uma conta? <a th:href="@{/cadastro}">Cadastre-se</a></p>
        </div>
    </div>

    <script th:src="@{/js/script.js}"></script>
</body>
</html>
