<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{home}">
<head>
    <meta charset="UTF-8">
    <title th:text="${produto.idProduto != null ? 'Editar Produto' : 'Cadastrar Produto'}">Cadastrar Produto</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .info-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div layout:fragment="content">

    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <a href="javascript:history.back()" class="btn btn-outline-secondary mb-3">
                    <i class="bi bi-arrow-left me-2"></i>Voltar
                </a>
                <h1 class="h3 fw-bold" th:text="${produto.idProduto != null ? 'Editar Produto' : 'Cadastrar Novo Produto'}">
                    Cadastrar Produto
                </h1>
                <p class="text-muted">Preencha as informações do produto de acordo com o sistema</p>
            </div>
        </div>

        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${sucesso}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/cadastrar-produto}" th:object="${produto}" method="post">
            <input type="hidden" th:field="*{idProduto}"/>
            
            <div class="row g-4">
                <div class="col-12 col-lg-8">
                    
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-body p-4">
                            <h5 class="card-title mb-3">
                                <i class="bi bi-info-circle me-2 text-primary"></i>Informações Básicas
                            </h5>

                            <div class="mb-3">
                                <label for="nomeProduto" class="form-label fw-medium">Nome do Produto <span class="text-danger">*</span></label>
                                <input type="text" 
                                       class="form-control form-control-lg" 
                                       id="nomeProduto" 
                                       th:field="*{nomeProduto}"
                                       maxlength="200"
                                       placeholder="Ex: Calculadora HP 12C Gold" 
                                       required>
                            </div>

                            <div class="mb-3">
                                <label for="descricao" class="form-label fw-medium">Descrição Completa</label>
                                <textarea class="form-control" 
                                          id="descricao" 
                                          th:field="*{descricao}"
                                          rows="5" 
                                          placeholder="Descreva os detalhes do produto..."></textarea>
                            </div>

                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label for="categoria" class="form-label fw-medium">Categoria</label>
                                    <select class="form-select" 
                                            id="categoria" 
                                            th:field="*{categoria.idCategoria}">
                                        <option value="">Selecione...</option>
                                        <option th:each="cat : ${categorias}" 
                                                th:value="${cat.idCategoria}" 
                                                th:text="${cat.nome_categoria}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="status" class="form-label fw-medium">Status</label>
                                    <select class="form-select" 
                                            id="status" 
                                            th:field="*{status}">
                                        <option value="ATIVO">Ativo</option>
                                        <option value="INATIVO">Inativo</option>
                                        <option value="ESGOTADO">Esgotado</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-body p-4">
                            <h5 class="card-title mb-3">
                                <i class="bi bi-box-seam me-2 text-primary"></i>Preço, Estoque e Detalhes
                            </h5>

                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label for="preco" class="form-label fw-medium">Preço (R$) <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text">R$</span>
                                        <input type="number" 
                                               class="form-control" 
                                               id="preco" 
                                               th:field="*{preco}"
                                               placeholder="0.00" 
                                               step="0.01" 
                                               min="0.00"
                                               required>
                                    </div>
                                </div>

                                <div class="col-12 col-md-6">
                                    <label for="estoque" class="form-label fw-medium">Estoque <span class="text-danger">*</span></label>
                                    <input type="number" 
                                           class="form-control" 
                                           id="estoque" 
                                           th:field="*{estoque}"
                                           placeholder="Ex: 10" 
                                           min="0"
                                           required>
                                </div>
                                
                                <div class="col-12 col-md-6 mt-3">
                                    <label for="dimensoes" class="form-label fw-medium">Dimensões</label>
                                    <input type="text" 
                                           class="form-control" 
                                           id="dimensoes" 
                                           th:field="*{dimensoes}"
                                           placeholder="Ex: 10x20x5 cm">
                                </div>

                                <div class="col-12 col-md-6 mt-3">
                                    <label for="peso" class="form-label fw-medium">Peso (kg)</label>
                                    <div class="input-group">
                                        <input type="number" 
                                               class="form-control" 
                                               id="peso" 
                                               th:field="*{peso}"
                                               placeholder="0.00" 
                                               step="0.01" 
                                               min="0.00">
                                        <span class="input-group-text">kg</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="col-12 col-lg-4">
                    
                    <div class="card border-0 shadow-sm sticky-top" style="top: 20px;">
                        <div class="card-body p-4">
                            <h5 class="card-title mb-4">Ações</h5>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-save me-2"></i>
                                    <span th:text="${produto.idProduto != null ? 'Atualizar Produto' : 'Salvar Produto'}">Salvar Produto</span>
                                </button>
                                <a th:href="@{/produtos}" class="btn btn-outline-secondary">
                                    Cancelar
                                </a>
                            </div>
                            
                        </div>
                    </div>

                </div>
            </div>
        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
