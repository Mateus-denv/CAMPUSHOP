# Configurações para testes
# Usa banco H2 em memória.
# MODE=MySQL ajuda a compatibilidade com DDL/metadata do Hibernate.

spring.application.name=campushop_backend_test

# Banco H2
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate (garantir que use DDL de criação)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
# Evita tentativas de DROP/alter foreign keys em tabelas que não existirem no H2
spring.jpa.properties.hibernate.hbm2ddl.import_files=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.thymeleaf.cache=false

# JWT
jwt.secret=Y2FtcHVzaG9wLXNlY3JldC1rZXktZm9yLWp3dC0yMDI2LWFwcC1zaWduYXR1cmU=
jwt.expiration=86400000

# Email (desabilita envio em testes)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test

# URL do Frontend para links
app.frontend.url=http://localhost:5173

# Rate limiting desabilitado nos testes
app.rate-limit.enabled=false

# Log
logging.level.root=WARN
logging.level.br.com.campushop=DEBUG

