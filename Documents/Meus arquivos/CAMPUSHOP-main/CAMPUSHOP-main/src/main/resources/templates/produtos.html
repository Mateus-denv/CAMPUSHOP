<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  lang="pt-BR"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${titulo}">CampusShop - Produtos</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body data-page="produtos">
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <div class="logo-circle" aria-hidden="true"></div>
          <a th:href="@{/home}" class="logo">Campus<span>Shop</span></a>
        </div>

        <nav class="main-nav">
          <a th:href="@{/home}">Home</a>
          <a th:href="@{/produtos}">Produtos</a>
          <a th:href="@{/conta}">Minha Conta</a>
          <form th:action="@{/logout}" method="post" style="display: inline">
            <button type="submit" class="btn btn-ghost">Sair</button>
          </form>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      <section class="section-panel">
        <div class="featured-header">
          <div>
            <h1 class="section-title">Produtos Disponíveis</h1>
            <p class="muted">Visualize e filtre os produtos cadastrados no marketplace.</p>
          </div>
          <button id="refreshProdutosBtn" class="btn btn-outline" type="button">Atualizar</button>
        </div>

        <div class="search-wrap produtos-search-wrap">
          <input
            id="produtosSearchInput"
            class="search"
            type="search"
            placeholder="Buscar por nome ou descrição"
            aria-label="Buscar produtos"
          />
        </div>

        <p id="produtosFeedback" class="muted feedback"></p>
        <div class="products-grid" id="produtosGrid"></div>
      </section>
    </main>

    <script th:src="@{/js/script.js}"></script>
  </body>
</html>
