<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  lang="pt-BR"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${titulo}">CampusShop - Minha Conta</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body data-page="conta">
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <div class="logo-circle" aria-hidden="true"></div>
          <a th:href="@{/home}" class="logo">Campus<span>Shop</span></a>
        </div>

        <nav class="main-nav">
          <a th:href="@{/home}">Home</a>
          <a th:href="@{/produtos}">Produtos</a>
          <a th:href="@{/conta}">Minha Conta</a>
          <form th:action="@{/logout}" method="post" style="display: inline">
            <button type="submit" class="btn btn-ghost">Sair</button>
          </form>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      <section class="section-panel">
        <div class="featured-header">
          <div>
            <h1 class="section-title">Minha Conta</h1>
            <p class="muted">Dados do seu perfil e histórico de pedidos.</p>
          </div>
          <button id="refreshContaBtn" class="btn btn-outline" type="button">Atualizar</button>
        </div>

        <div id="contaFeedback" class="muted feedback"></div>

        <div class="account-grid" id="accountInfo">
          <div class="data-card"><strong>Nome:</strong> <span id="contaNome">-</span></div>
          <div class="data-card"><strong>Email:</strong> <span id="contaEmail">-</span></div>
          <div class="data-card"><strong>Tipo:</strong> <span id="contaTipo">-</span></div>
          <div class="data-card"><strong>Instituição:</strong> <span id="contaInstituicao">-</span></div>
          <div class="data-card"><strong>Cidade:</strong> <span id="contaCidade">-</span></div>
        </div>

        <div class="featured-header pedidos-header" id="pedidosSection">
          <div>
            <h2 class="section-title">Meus Pedidos</h2>
            <p class="muted">Pedidos vinculados ao seu usuário cliente.</p>
          </div>
        </div>
        <div id="pedidosGrid" class="orders-grid"></div>
      </section>
    </main>

    <script th:src="@{/js/script.js}"></script>
  </body>
</html>
